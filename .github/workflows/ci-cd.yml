#!/bin/bash


set -e  # Остановить скрипт при любой ошибке

echo "Начинаем деплой..."


echo ""
echo "FRONTEND: FastDoor Web "

cd ~/fast-door-web || exit 1


# Сохраняем текущий .env (на случай если git reset потребуется)
if [ -f .env.production ]; then
    cp .env.production .env.backup
    echo ".env.production сохранён в .env.backup"
fi

# Обновляем код
git pull origin master

# Восстанавливаем .env если он пропал (на всякий случай)
if [ ! -f .env.production ] && [ -f .env.backup ]; then
    cp .env.backup .env.production
    echo ".env.production восстановлен из бэкапа"
fi

# Устанавливаем зависимости
npm install

# Собираем проект (Next.js требует билд для продакшена)
npm run build

# Перезапускаем через PM2 (без простоя)
pm2 restart fast-door-web

echo "Frontend деплой завершён"


# RELOAD NGINX

echo ""
echo "NGINX"

# Проверяем конфиг и перезагружаем
sudo nginx -t && sudo systemctl reload nginx
echo "Nginx перезапущен"

# CLEANUP
echo ""
echo "Очистка"

# Удаляем временный бэкап
rm -f ~/fast-door-web/.env.production

# Чистим кэш npm 
npm cache clean --force 2>/dev/null || true

echo "Очистка завершена"


# STATUS CHECK
echo ""
echo "Итоговый статус"

pm2 status

echo ""
echo "DEPLOY SUCCESSFUL"
echo "Сайт: https://fast-door.ru"
