name: Deploy FastDoor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "Начинаем деплой..."

            echo ""
            echo "FRONTEND: FastDoor Web"

            cd ~/fast-door-web || exit 1

            # Сохраняем текущий .env
            if [ -f .env.production ]; then
              cp .env.production .env.backup
              echo ".env.production сохранён в .env.backup"
            fi

            # Обновляем код
            git pull origin main

            # Восстанавливаем .env если пропал
            if [ ! -f .env.production ] && [ -f .env.backup ]; then
              cp .env.backup .env.production
              echo ".env.production восстановлен из бэкапа"
            fi

            # Устанавливаем зависимости
            npm install

            # Собираем Next.js
            npm run build

            # Перезапуск PM2
            pm2 restart fast-door-web

            echo "Frontend деплой завершён"

            echo ""
            echo "NGINX"

            # Перезагрузка nginx
            sudo nginx -t && sudo systemctl reload nginx

            echo "Nginx перезапущен"

            echo ""
            echo "Очистка"

            # Удаляем временный бэкап
            rm -f ~/fast-door-web/.env.backup

            # Чистим кэш npm
            npm cache clean --force 2>/dev/null || true

            echo "Очистка завершена"

            echo ""
            echo "Итоговый статус"

            pm2 status

            echo ""
            echo "DEPLOY SUCCESSFUL"
            echo "Сайт: https://fast-door.ru"