name: Deploy Fast-Door

on:
  push:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            echo "Начинаем деплой..."
            cd ~/fast-door-web || exit 1
            echo "FRONTEND: FastDoor Web"
            if [ -f .env.production ]; then
              cp .env.production .env.backup
              echo ".env.production сохранён в .env.backup"
            fi
            git checkout -- package-lock.json
            git pull origin main
            if [ ! -f .env.production ] && [ -f .env.backup ]; then
              cp .env.backup .env.production
              echo ".env.production восстановлен из бэкапа"
            fi
            npm ci
            npm run build
            pm2 restart fast-door-web
            echo "Frontend деплой завершён"
            echo "NGINX"
            sudo nginx -t && sudo systemctl reload nginx
            echo "Nginx перезапущен"
            echo "Очистка dev-файлов и dev-зависимостей"
            rm -f ~/fast-door-web/.env.backup
            npm prune --production
            rm -rf ~/fast-door-web/pages ~/fast-door-web/components ~/fast-door-web/styles ~/fast-door-web/tests ~/fast-door-web/scripts ~/fast-door-web/.vscode ~/fast-door-web/.eslintrc.js ~/fast-door-web/.prettierrc
            npm cache clean --force 2>/dev/null || true
            echo "Очистка завершена"
            pm2 status
            echo "DEPLOY SUCCESSFUL"
            echo "Сайт: https://fast-door.ru"